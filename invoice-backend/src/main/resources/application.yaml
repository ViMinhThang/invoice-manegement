spring:
  data:
    jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          show_sql: true

datasource:
  url: jdbc:postgresql://localhost:5432/your_database_name
  username: your_username
  password: your_password
  driver-class-name: org.postgresql.Driver

jpa:
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQL9Dialect
